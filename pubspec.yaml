name: rsc_mobile
description: "RSC customer mobile application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # state management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # navigation
  go_router: ^13.0.0

  # networking
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider: ^2.1.0
  # retrofit added in Phase 3 when data sources are implemented

  # dependency injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # firebase (configured in Phase 9 — packages declared early for DI scaffolding)
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # maps & location
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.0

  # serialization
  json_annotation: ^4.9.0

  # utils
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  envied: ^0.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # code generation
  build_runner: ^2.4.9
  # retrofit_generator added in Phase 3
  injectable_generator: ^2.4.1
  json_serializable: ^6.8.0
  envied_generator: ^0.5.4

flutter:
  uses-material-design: true

  assets:
    - rsc-assets/icons/png/house_1f3e0.png
    - rsc-assets/icons/png/magnifying-glass-tilted-left_1f50d.png
    - rsc-assets/icons/png/shopping-cart_1f6d2.png
    - rsc-assets/icons/png/round-pushpin_1f4cd.png
    - rsc-assets/icons/png/bust-in-silhouette_1f464.png
